<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>提示詞器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 鏡頭全屏背景 -->
    <video id="cameraPreview" autoplay playsinline muted></video>

    <!-- 倒數計時全屏覆蓋 -->
    <div id="countdownOverlay">
        <span id="countdownNumber">3</span>
    </div>

    <!-- ===== 提示詞浮窗 ===== -->
    <div id="prompterWindow">

        <!-- 右上角設定按鈕 -->
        <button id="btnOpenSettings" class="pwin-btn top-right">設定</button>

        <!-- 文字可視區域 -->
        <div id="prompterContainer">
            <div id="textWrapper">
                <div id="scrollingText">請先點右上角「設定」輸入提示詞…</div>
            </div>
        </div>

        <!-- 左下角拖拽按鈕 -->
        <button id="dragHandle" class="pwin-btn bottom-left">移動</button>

        <!-- 右下角縮放把手 -->
        <div id="resizeHandle">⊿</div>
    </div>

    <!-- ===== 設定抽屜（從頂部滑入）===== -->
    <div id="settingsDrawer">
        <div id="drawerHeader">
            <span>設　定</span>
            <button id="btnCloseSettings">關閉</button>
        </div>

        <div class="drawer-body">

            <div class="setting-row full">
                <label>提示詞內容</label>
                <textarea id="textInput" placeholder="請在此輸入您的提示詞..."></textarea>
            </div>

            <div class="setting-row">
                <label>預計影片時長</label>
                <strong id="estimatedTime">0.0 秒</strong>
            </div>

            <div class="setting-row">
                <label>語速（WPM）<span id="speedDisplay">120</span></label>
                <input type="range" id="scrollSpeed" min="30" max="400" value="120">
            </div>

            <div class="setting-row">
                <label>字體大小 <span id="fontSizeDisplay">30</span>px</label>
                <input type="range" id="fontSize" min="16" max="100" value="30">
            </div>

            <div class="setting-row">
                <label>文字顏色</label>
                <input type="color" id="fontColor" value="#ffffff">
            </div>

            <div class="setting-row">
                <label>錄影倒計時（秒）</label>
                <input type="number" id="countdownTime" value="3" min="0" max="10">
            </div>

            <div class="setting-row">
                <label>提示器旋轉</label>
                <div class="btn-group">
                    <button id="btnRotLeft">左旋 90</button>
                    <button id="btnPortrait">正常</button>
                    <button id="btnRotRight">右旋 90</button>
                </div>
            </div>

            <div id="downloadContainer">
                <a id="downloadLink" class="download-btn" href="#" download="teleprompter.mp4">下載影片</a>
            </div>

        </div>
    </div>

    <!-- ===== 底部固定工具列 ===== -->
    <div id="bottomBar">

        <!-- 左側控制區 -->
        <div class="bar-side left-controls">
            <div class="mini-control">
                <button class="adj-btn" id="wpmDown">－</button>
                <span class="ctrl-label">WPM<br><span id="wpmDisplay">120</span></span>
                <button class="adj-btn" id="wpmUp">＋</button>
            </div>
        </div>

        <!-- 中央按鈕區 -->
        <div class="bar-center">
            <!-- 切換鏡頭 -->
            <button id="btnFlip" class="bar-btn">翻轉</button>
            <!-- 錄影 -->
            <button id="btnRecord" class="record-btn">
                <span id="recordIcon"></span>
            </button>
            <!-- 反鏡像 -->
            <button id="btnMirror" class="bar-btn mirror-active">鏡像</button>
        </div>

        <!-- 右側控制區 -->
        <div class="bar-side right-controls">
            <div class="mini-control">
                <button class="adj-btn" id="fsDown">－</button>
                <span class="ctrl-label">字體<br><span id="fsDisplay">30</span>px</span>
                <button class="adj-btn" id="fsUp">＋</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
