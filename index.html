<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Teleprompter</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<video id="cameraPreview" autoplay playsinline muted></video>

<div id="countdownOverlay">
    <span id="countdownNumber">3</span>
</div>

<!-- 提示詞浮窗 -->
<div id="prompterWindow">
    <button id="btnOpenSettings" class="pwin-btn top-right">
        <i data-lucide="settings"></i>
    </button>
    <button id="dragHandle" class="pwin-btn bottom-left">
        <i data-lucide="move"></i>
    </button>
    <div id="resizeHandle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
    </div>
    <div id="prompterContainer">
        <div id="scrollingText"></div>
    </div>
</div>

<!-- 設定抽屜 -->
<div id="settingsDrawer">
    <div id="drawerHeader">
        <span data-i18n="settings">設定</span>
        <button id="btnCloseSettings"><i data-lucide="x"></i></button>
    </div>
    <div class="drawer-body">

        <div class="setting-row">
            <label data-i18n="language">語言</label>
            <div class="seg-ctrl">
                <button data-lang="zh-TW" class="seg-btn">繁體</button>
                <button data-lang="zh-CN" class="seg-btn">简体</button>
                <button data-lang="en"    class="seg-btn">EN</button>
            </div>
        </div>

        <div class="setting-row full">
            <label data-i18n="scriptLabel">提示詞</label>
            <textarea id="textInput" data-i18n-ph="scriptPlaceholder" placeholder="請輸入提示詞..."></textarea>
        </div>

        <div class="setting-row">
            <label data-i18n="estDuration">預計時長</label>
            <strong id="estimatedTime">0:00</strong>
        </div>

        <div class="setting-row">
            <label data-i18n="wpmLabel">語速 (WPM)</label>
            <span class="val-badge" id="speedDisplay">120</span>
        </div>
        <div class="setting-row slider-row">
            <input type="range" id="scrollSpeed" min="30" max="400" value="120">
        </div>

        <div class="setting-row">
            <label data-i18n="fontSizeLabel">字體大小</label>
            <span class="val-badge"><span id="fontSizeDisplay">30</span>px</span>
        </div>
        <div class="setting-row slider-row">
            <input type="range" id="fontSize" min="16" max="100" value="30">
        </div>

        <div class="setting-row">
            <label data-i18n="fontColorLabel">文字顏色</label>
            <input type="color" id="fontColor" value="#ffffff">
        </div>

        <div class="setting-row">
            <label data-i18n="countdownLabel">倒計時</label>
            <span class="val-badge"><span id="countdownDisplay">3</span>s</span>
        </div>
        <div class="setting-row slider-row">
            <input type="range" id="countdownSlider" min="0" max="10" value="3">
        </div>

        <div class="setting-row">
            <label data-i18n="rotationLabel">旋轉</label>
            <div class="btn-group">
                <button id="btnRotLeft"><i data-lucide="rotate-ccw"></i></button>
                <button id="btnPortrait"><i data-lucide="smartphone"></i></button>
                <button id="btnRotRight"><i data-lucide="rotate-cw"></i></button>
            </div>
        </div>

        <div id="downloadContainer">
            <a id="downloadLink" class="download-btn" href="#" download="teleprompter.mp4">
                <i data-lucide="download"></i>
                <span data-i18n="downloadBtn">下載影片</span>
            </a>
        </div>

    </div>
</div>

<!-- 底部工具列 -->
<div id="bottomBar">
    <!-- 左側：WPM 調整 -->
    <div class="bar-left">
        <div class="mini-ctrl">
            <button class="adj-btn" id="wpmDown"><i data-lucide="minus"></i></button>
            <span class="ctrl-label">WPM<br><b id="wpmDisplay">120</b></span>
            <button class="adj-btn" id="wpmUp"><i data-lucide="plus"></i></button>
        </div>
    </div>

    <!-- 中間：錄影鈕 -->
    <button id="btnRecord" class="record-btn">
        <span id="recordIcon"></span>
    </button>

    <!-- 右側：Flip + Mirror -->
    <div class="bar-right">
        <button id="btnFlip" class="bar-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px">
                <path d="M20 7h-3.2L15 5H9L7.2 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                <circle cx="12" cy="13" r="3"/>
                <path d="M16.5 5.5 A5 5 0 0 1 20 10"/>
                <polyline points="19 8 21 10 19 12"/>
            </svg>
        </button>
        <button id="btnMirror" class="bar-btn mirror-active">
            <i data-lucide="flip-horizontal-2"></i>
        </button>
    </div>
</div>

<script src="script.js"></script>
<script>
    lucide.createIcons();
    document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
    let _lte = 0;
    document.addEventListener('touchend', e => {
        const now = Date.now();
        if (now - _lte < 350) e.preventDefault();
        _lte = now;
    }, { passive: false });
</script>
</body>
</html>
