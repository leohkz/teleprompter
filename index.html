<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>提示詞器</title>
    <!-- Lucide Icons (MIT) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video id="cameraPreview" autoplay playsinline muted></video>

    <div id="countdownOverlay">
        <span id="countdownNumber">3</span>
    </div>

    <!-- ===== 提示詞浮窗 ===== -->
    <div id="prompterWindow">

        <!-- 右上：設定 -->
        <button id="btnOpenSettings" class="pwin-btn top-right" title="設定">
            <i data-lucide="settings"></i>
        </button>

        <!-- 文字區 -->
        <div id="prompterContainer">
            <div id="textWrapper">
                <div id="scrollingText">請先點右上角「⚙」輸入提示詞…</div>
            </div>
        </div>

        <!-- 左下：拖拽 -->
        <button id="dragHandle" class="pwin-btn bottom-left" title="拖拽移動">
            <i data-lucide="move"></i>
        </button>

        <!-- 右下：縮放 -->
        <div id="resizeHandle">
            <i data-lucide="chevrons-right-left" style="transform:rotate(45deg)"></i>
        </div>
    </div>

    <!-- ===== 設定抽屜 ===== -->
    <div id="settingsDrawer">
        <div id="drawerHeader">
            <span>設　定</span>
            <button id="btnCloseSettings">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div class="drawer-body">

            <div class="setting-row full">
                <label>提示詞內容</label>
                <textarea id="textInput" placeholder="請在此輸入您的提示詞..."></textarea>
            </div>

            <div class="setting-row">
                <label>預計影片時長</label>
                <strong id="estimatedTime">0.0 秒</strong>
            </div>

            <div class="setting-row">
                <label>WPM 語速 &nbsp;<span id="speedDisplay">120</span></label>
                <input type="range" id="scrollSpeed" min="30" max="400" value="120">
            </div>

            <div class="setting-row">
                <label>字體大小 &nbsp;<span id="fontSizeDisplay">30</span>px</label>
                <input type="range" id="fontSize" min="16" max="100" value="30">
            </div>

            <div class="setting-row">
                <label>文字顏色</label>
                <input type="color" id="fontColor" value="#ffffff">
            </div>

            <div class="setting-row">
                <label>錄影倒計時（秒）</label>
                <input type="number" id="countdownTime" value="3" min="0" max="10">
            </div>

            <div class="setting-row">
                <label>提示器旋轉</label>
                <div class="btn-group">
                    <button id="btnRotLeft" title="左旋90度">
                        <i data-lucide="rotate-ccw"></i>
                    </button>
                    <button id="btnPortrait" title="正常方向">
                        <i data-lucide="smartphone"></i>
                    </button>
                    <button id="btnRotRight" title="右旋90度">
                        <i data-lucide="rotate-cw"></i>
                    </button>
                </div>
            </div>

            <div id="downloadContainer">
                <a id="downloadLink" class="download-btn" href="#" download="teleprompter.mp4">
                    <i data-lucide="download"></i>&nbsp;下載影片
                </a>
            </div>

        </div>
    </div>

    <!-- ===== 底部工具列 ===== -->
    <div id="bottomBar">

        <!-- 左：WPM 調節 -->
        <div class="bar-side">
            <div class="mini-control">
                <button class="adj-btn" id="wpmDown"><i data-lucide="minus"></i></button>
                <span class="ctrl-label">WPM<br><span id="wpmDisplay">120</span></span>
                <button class="adj-btn" id="wpmUp"><i data-lucide="plus"></i></button>
            </div>
        </div>

        <!-- 中央 -->
        <div class="bar-center">
            <button id="btnFlip" class="bar-btn" title="切換鏡頭">
                <i data-lucide="camera"></i>
                <i data-lucide="refresh-cw" class="icon-sm"></i>
            </button>

            <button id="btnRecord" class="record-btn">
                <span id="recordIcon"></span>
            </button>

            <button id="btnMirror" class="bar-btn mirror-active" title="反鏡像">
                <i data-lucide="flip-horizontal-2"></i>
            </button>
        </div>

        <!-- 右：字體大小調節 -->
        <div class="bar-side">
            <div class="mini-control">
                <button class="adj-btn" id="fsDown"><i data-lucide="minus"></i></button>
                <span class="ctrl-label">字體<br><span id="fsDisplay">30</span>px</span>
                <button class="adj-btn" id="fsUp"><i data-lucide="plus"></i></button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
